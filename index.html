<!DOCTYPE HTML>
<html>
	<head>
		<title>Завдання JS</title>
		<meta charset="UTF-8">
	</head>
	<body>
		<h1>Скільки років у цих днях?</h1>
		<p>задайте кількість років <input name="day" id="day" type="text" value="365"></p>
		<p>Відповідь: <label name="Year" id="Year">1</label></p>
		<input type="button" id="DoSm" value="Розрахувати">
		<script>
		DoSm.onclick =  function() {
				var DayVal=document.getElementById('day').value;
				var Rez=0;
				if(DayVal>=365){
					Rez=DayVal/365;
				}
				else{
					Rez="Значення має бути числовим та більше 365!";
				}
				document.getElementById('Year').innerHTML = Rez;
		}
		</script>
	</body>
</html>
